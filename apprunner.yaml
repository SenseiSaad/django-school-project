version: 1.0
runtime: python311
build:
  commands:
    build:
      - pip3 install -r requirements.txt
      - python manage.py collectstatic --noinput
run:
  command: gunicorn portfolio_backend.wsgi:application --bind 0.0.0.0:8000 --workers 2
  network:
    port: 8000
  env:
    - name: DJANGO_SETTINGS_MODULE
      value: portfolio_backend.settings



